name: Deploy to GitHub Pages

# Mirrors the pushed branch to gh-pages, which GitHub Pages serves.
# (The pages-API approach needs repo-admin rights the Actions token
# doesn't have; pushing gh-pages needs only contents: write.)

on:
  push:
    branches: [main, claude/vegas-delivery-game-9ajx8t]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push site to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push --force origin HEAD:gh-pages
